<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  
  <title>Frontend Mentor | Blog preview card</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; 
    }
    .attribution a { color: hsl(228, 45%, 44%); }
   h1,h2,h4,p{
    margin: 0;
}
.box{
    margin-top: 10px;
}

p{
    margin-top: 6px;
}

h1{
    margin-top: 10px;
}

h4:last-child{
    margin-top: 10px;
}
  
    h1,h2,h4{


      font-family: Figtree;
      font-size: 1rem;
    }
    h1{
      font-size:1.5rem;
    }
    p{
      font-family: Figtree;
      font-weight: 300;
      font-size: 1rem;
      line-height: 1.7;
      margin-top:12px;
    }
    body{
      margin: 0;
      background-color: hsl(47, 88%, 63%);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      
    }
    img{
      width: 100%;
      border-radius: 10px;
    }
    .container{
      display:flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      margin: 0;
      padding: 20px;
      flex:1;
      
    }
    .parent{
      
      max-width: 300px;
      display:flex;
      flex-direction: column;
      
      align-items: flex-start;
      border: 1px solid;
      padding:30px;
      border-radius: 10px;
      background-color: hsl(0, 0%, 100%);
      box-shadow:10px 10px  hsl(0, 0%, 42%);
      box-shadow:10px 10px hsl(0, 0%, 7%);
      
     
    }
    .box{
      min-width: 10px;
      min-height :10px;
      padding: 5px;
      padding-left: 12px;
      padding-right: 12px;
      
      background-color: hsl(47, 88%, 63%);
    }
    .author{
      display: flex;
      
      gap: 10px;
      margin-top: 25px;
    }
    .avatar{
      
      width: 40px;
      height: auto;
      border-radius: 50%;
    }
    .state{
      font-weight: 400;
    }
  </style>
</head>
<body>
  <section class ="container">
 <section class="parent">
  <img src="assets/images/illustration-article.svg" alt="Article illustration" />

 <h4 class="box">Learning</h4>

 <p class="state"> Published 21 Dec 2023</p>

 <h1> HTML & CSS foundations</h1>

  <p>These languages are the backbone of every website, defining structure, content, and presentation.</p>
  <div class="author">
    <img class="avatar" src="assets/images/image-avatar.webp" alt="Greg Hooper" />
   <h4>Greg Hooper</h4>
  </div>

  </section>
  </section>
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </footer>
</body>
</html>
